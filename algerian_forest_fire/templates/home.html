<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forest Fire Prediction</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; background-color: #f9f9f9; }
    .container { max-width: 500px; margin: auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); }
    h1 { text-align: center; color: #333; }
    label { display: block; margin-top: 1rem; font-weight: bold; color: #555; }
    input, select { width: 100%; padding: 0.5rem; margin-top: 0.25rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { margin-top: 1.5rem; padding: 0.75rem 1rem; width: 100%; background-color: #d9534f; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    button:hover { background-color: #c9302c; }
    .result-box { margin-top: 1.5rem; padding: 1rem; background-color: #dff0d8; border: 1px solid #d6e9c6; color: #3c763d; text-align: center; border-radius: 4px; font-size: 1.2rem; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Forest Fire Prediction</h1>
    
    <form method="post" action="/predictdata">
      <label for="temperature">Temperature</label>
      <input type="text" id="temperature" name="Temperature" placeholder="Enter temperature" required>

      <label for="rh">RH (Relative Humidity)</label>
      <input type="text" id="rh" name="RH" placeholder="Enter relative humidity" required>

      <label for="ws">Ws (Wind Speed)</label>
      <input type="text" id="ws" name="Ws" placeholder="Enter wind speed" required>

      <label for="rain">Rain</label>
      <input type="text" id="rain" name="Rain" placeholder="Enter rain value" required>

      <label for="ffmc">FFMC</label>
      <input type="text" id="ffmc" name="FFMC" placeholder="Enter FFMC" required>

      <label for="dmc">DMC</label>
      <input type="text" id="dmc" name="DMC" placeholder="Enter DMC" required>

      <label for="isi">ISI</label>
      <input type="text" id="isi" name="ISI" placeholder="Enter ISI" required>

      <label for="classes">Classes</label>
      <select id="classes" name="Classes" required>
        <option value="">Select class</option>
        <option value="fire">Fire</option>
        <option value="not_fire">Not Fire</option>
      </select>

      <label for="region">Region</label>
      <select id="region" name="Region" required>
        <option value="">Select Region</option>
        <option value="1">Bejaia</option>
        <option value="0">Sidi Bel-Abbes</option>
      </select>

      <button type="submit">Predict FWI</button>
    </form>

    {% if results is not none %}
      <div class="result-box">
        The predicted Forest Weather Index (FWI) is: {{ results }}
      </div>
    {% endif %}
  </div>
</body>
</html>
